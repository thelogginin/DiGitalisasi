<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
body{
  font-family:system-ui;
  background:#f4f6f9;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  width:100%;
  max-width:360px;
  background:white;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{margin-top:0;text-align:center;}

.box-form input{
  width:100%;
  padding:12px;
  margin:8px 0;
  box-sizing : border-box;
  border-radius:8px;
  font-size:16px;
}


button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0066ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{background:#004ecc;}

.msg{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}



</style>
</head>

<body>

<div class="card">
<h2>LOGIN</h2>
<div class="box-form">
<label>Username</label>
<input id="username" placeholder="Username">
</div>
    
<div class="box-form">
<label>Password</label>
<input id="password" type="password" placeholder="Password">
</div>
<input type="checkbox" onclick="showHide()">  Tampilkan Password<br><br>

<button onclick="login()">Masuk</button>

<div class="msg" id="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbybI3JKrj4UeeZgPfK_ekId-poUfP58tD6DrMp6M9LZXUx-tELzGpu0ff4LQQt6XDPy5w/exec";

function routeByRole(role){

  role = String(role).toUpperCase();

  if(role === "ADMIN")  return "admin.html";
  if(role === "KEPALA") return "kepala.html";
  if(role === "USER")   return "user.html";

  return "index.html"; // fallback
}

/* AUTO LOGIN */
window.onload = async ()=>{

  const token = localStorage.getItem("token");
  if(!token) return;

  const f = new FormData();
  f.append("action","check");
  f.append("token",token);

  const r = await fetch(API_URL,{method:"POST",body:f});
  const d = await r.json();

  if(d.status){
    location.replace(routeByRole(d.user.role));
  }else{
    localStorage.clear();
  }
};

/* HASH */
async function sha256(msg){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* LOGIN */
async function login(){

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.innerText = "Memproses...";

  try{

    const u = username.value;
    const p = await sha256(password.value);

    const f = new FormData();
    f.append("action","login");
    f.append("username",u);
    f.append("password_hash",p);

    const r = await fetch(API_URL,{method:"POST",body:f});
    const d = await r.json();

    if(d.status){
      localStorage.setItem("token",d.token);
      location.href = routeByRole(d.role);
    }else{
      msg.innerText = "❌ Login gagal";
    }

  }catch(err){
    msg.innerText = "⚠️ Server tidak merespon";
  }

  btn.disabled = false;
  btn.innerText = "Masuk";
}
/* ENTER = LOGIN */
document.addEventListener("keydown", function(e){

  if(e.key === "Enter"){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    // hanya login jika field sudah diisi
    if(u && p){
      login();
    }
  }

});
/* HIDE UNHIDE */
function showHide() {
  var inputan = document.getElementById("password");
  if (inputan.type === "password") {
    inputan.type = "text";
  } else {
    inputan.type = "password";
  }
} 
</script>

</body>
</html>
