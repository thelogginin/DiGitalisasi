<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
body{
  font-family:system-ui;
  background:#f4f6f9;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  width:100%;
  max-width:360px;
  background:white;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{margin-top:0;text-align:center;}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0066ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{background:#004ecc;}

.msg{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
<h2>LOGIN</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<div class="msg" id="msg"></div>
</div>

<script>
/* ===== GANTI DENGAN URL WEB APP ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbybI3JKrj4UeeZgPfK_ekId-poUfP58tD6DrMp6M9LZXUx-tELzGpu0ff4LQQt6XDPy5w/exec";

/* AUTO LOGIN CHECK */
window.onload = async ()=>{

  const token = localStorage.getItem("token");
  if(!token) return;

  const form = new FormData();
  form.append("action","check");
  form.append("token",token);
  form.append("_ts",Date.now());

  const res = await fetch(API_URL,{
    method:"POST",
    body:form,
    cache:"no-store"
  });

  const data = await res.json();

  if(data.status){

    if(data.user.role === "ADMIN"){
      window.location.replace("admin.html");
    }else{
      window.location.replace("user.html");
    }

  }else{
    localStorage.clear();
  }
};

/* ===== SHA-256 HASH FUNCTION ===== */
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ===== LOGIN FUNCTION ===== */
async function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const password_hash = await sha256(password);

  const form = new FormData();
  form.append("action","login");
  form.append("username",username);
  form.append("password_hash",password_hash);

  const res = await fetch(API_URL,{
    method:"POST",
    body:form
  });

  const data = await res.json();
  
		if(data.status){

	  localStorage.setItem("token", data.token);
	  localStorage.setItem("role", data.role);

	  if(data.role === "ADMIN"){
		window.location.href = "admin.html";
	  }else{
		window.location.href = "user.html";
	  }

	}else{
	  document.getElementById("msg").innerHTML="❌ Login gagal";
	}
}
</script>

</body>
</html>
